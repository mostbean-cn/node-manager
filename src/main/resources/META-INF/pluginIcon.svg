<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#5FA04E"/>
            <stop offset="100%" style="stop-color:#417E38"/>
        </linearGradient>
    </defs>
    <!-- 圆角矩形背景 -->
    <rect x="1" y="1" width="38" height="38" rx="8" ry="8" fill="url(#grad)"/>
    <!-- Node.js 六边形轮廓（简化） -->
    <polygon points="20,6 32,13 32,27 20,34 8,27 8,13" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <!-- 字母 N -->
    <text x="20" y="27" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">N</text>
</svg>
